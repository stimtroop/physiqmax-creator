<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhysiqMax — Creator Card Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --bg:#08070D;
    --card:#0D0F11;
    --cardborder:rgba(132,72,255,0.35);
    --green:#63D463;
    --greenAccent:#20E0A0;
    --purple:#7B2CFF;
    --text:#F5F5F7;
    --muted:#8E929C;
    --blue:#2f6bff;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f3f4f6;color:#111;
    display:grid;grid-template-columns:330px 1fr;min-height:100vh;
  }

  /* ===================== SIDEBAR ===================== */
  .sidebar{background:#fff;border-right:1px solid #ececef;padding:22px 22px 28px;overflow-y:auto}
  .sidebar .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
  .sidebar h1{font-size:18px;margin:0;font-weight:700;color:#111}
  .sidebar .chev{color:#9aa0a6;font-size:18px}
  .sec{font-size:14px;font-weight:600;color:#111;margin:0 0 10px}
  .grp{margin-bottom:22px}
  .ratio-row{display:flex;gap:8px}
  .ratio-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:13.5px;font-weight:500;cursor:pointer;
    background:#eef0f2;color:#3a3a3a;font-family:inherit}
  .ratio-btn.active{background:var(--blue);color:#fff}
  .pp-row{display:flex;align-items:center;gap:12px}
  .pp-prev{width:58px;height:58px;border-radius:50%;background:#374151;display:flex;align-items:center;justify-content:center;
    overflow:hidden;flex-shrink:0;color:#aeb4be}
  .pp-prev svg{width:22px;height:22px}
  .upload-btn{padding:9px 15px;border-radius:9px;border:1px solid #e3e5e8;background:#f4f5f6;color:#333;font-size:13.5px;
    font-weight:500;cursor:pointer;font-family:inherit}
  .upload-btn:hover{background:#eceef0}
  .fld{display:block;font-size:13px;color:#475569;margin:0 0 6px}
  .row+ .row{margin-top:14px}
  input[type=number]{width:100%;padding:11px 12px;border-radius:10px;border:1px solid #e3e5e8;background:#fff;
    color:#111;font-size:14px;outline:none;font-family:inherit}
  input[type=number]:focus{border-color:var(--blue)}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .btn-export{width:100%;margin-top:4px;padding:14px;border:none;border-radius:12px;background:var(--blue);color:#fff;
    font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-export:active{transform:translateY(1px)}
  .btn-reset{width:100%;margin-top:10px;padding:11px;border-radius:10px;border:1px solid #e7e9ec;background:#fff;
    color:#6b7280;font-size:13.5px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px}
  .btn-reset svg{width:15px;height:15px}

  /* ===================== STAGE + FRAME ===================== */
  .stage{display:flex;align-items:center;justify-content:center;overflow:auto;padding:30px}
  #frameOuter{position:relative}
  /* The export surface. Its purple-bloom background blends with the card so the
     square layout reads intentionally rather than floating in empty space. */
  #frame{position:absolute;left:0;top:0;transform-origin:top left;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(40% 52% at -2% 45%, rgba(123,44,255,.34), rgba(123,44,255,0) 70%),
      radial-gradient(40% 52% at 102% 45%, rgba(123,44,255,.30), rgba(123,44,255,0) 70%),
      radial-gradient(60% 28% at 50% -4%, rgba(123,44,255,.16), rgba(123,44,255,0) 70%),
      #08070D;}

  /* No transforms anywhere inside the frame — html2canvas mis-renders nested
     transforms, so the card is sized natively and centered purely with flexbox. */
  .card-center{display:flex}

  /* ===================== THE SHARE CARD (matches app) ===================== */
  #card{
    width:330px;
    position:relative;overflow:hidden;border-radius:30px;color:var(--text);
    font-family:var(--font);
    background:
      radial-gradient(120% 70% at 50% -6%, rgba(123,44,255,.28) 0%, rgba(13,15,17,0) 52%),
      linear-gradient(180deg, #0D0F11 0%, #08070D 100%);
    border:1px solid var(--cardborder);
    box-shadow:0 0 0 1px rgba(132,72,255,.10), 0 30px 80px -28px rgba(123,44,255,.55);
    padding:24px 18px 22px;
  }
  .bloom{position:absolute;left:0;right:0;top:0;height:320px;pointer-events:none;
    background:radial-gradient(48% 46% at 50% 40%, rgba(32,224,160,.12) 0%, rgba(123,44,255,.10) 38%, rgba(0,0,0,0) 72%)}

  /* avatar */
  .avatar-wrap{position:relative;display:flex;justify-content:center}
  .avatar{width:124px;height:124px;border-radius:32px;padding:2.5px;
    background:linear-gradient(140deg, var(--purple) 0%, var(--greenAccent) 100%);
    box-shadow:0 12px 34px rgba(0,0,0,.55), 0 0 42px rgba(123,44,255,.35), 0 0 52px rgba(32,224,160,.20)}
  .avatar-inner{width:100%;height:100%;border-radius:30px;background:#15171B;overflow:hidden;
    display:flex;align-items:center;justify-content:center}
  .avatar-inner svg{width:42px;height:42px;color:rgba(255,255,255,.30)}

  /* hero */
  .hero{position:relative;display:flex;flex-direction:column;align-items:center;margin-top:20px}
  .overall-label{font-size:11px;font-weight:700;letter-spacing:.22em;color:var(--muted);padding-left:.22em}
  .score-row{display:flex;align-items:center;gap:10px;margin-top:4px}
  .score-num{display:flex;align-items:flex-end}
  .score{font-size:78px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums}
  .score-slash{font-size:18px;font-weight:700;color:var(--muted);margin-bottom:13px}
  .pill{display:inline-flex;align-items:center;border-radius:999px;height:24px;padding:0 11px;
    font-size:11px;font-weight:800;letter-spacing:.08em}
  .hero-bar{margin-top:12px;width:204px}

  /* brand badge */
  .badge{position:relative;display:flex;justify-content:center;margin-top:16px}
  .badge-inner{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 11px 5px 6px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09)}
  /* Fixed wrapper is the flex item; the <img> inside is NOT a flex item, so it
     can never be compressed. Dimensions are hard-locked with min/max too, so no
     flex rule, inherited CSS, or html2canvas quirk can resize it. Square source
     + equal w/h = no squish anywhere, including exports. Corners baked into PNG. */
  .badge-inner .badge-logo{flex:0 0 17px;width:17px;height:17px;min-width:17px;max-width:17px;
    display:inline-block;line-height:0}
  .badge-inner .badge-logo img{width:17px;height:17px;min-width:17px;max-width:17px;
    min-height:17px;max-height:17px;display:block;border-radius:6px;object-fit:cover}
  .badge-inner span{font-size:12px;font-weight:600;color:var(--text)}

  /* stat grid */
  .grid{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px}
  .stat{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:10px 12px}
  .stat .lbl{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
  .stat .srow{display:flex;align-items:flex-end;justify-content:space-between;margin-top:6px}
  .stat .val{display:flex;align-items:baseline;gap:4px}
  .stat .num{font-size:30px;font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
  .stat .slash{font-size:11px;font-weight:600;color:var(--muted)}
  .stat .stier{font-size:9px;font-weight:800;letter-spacing:.05em;margin-bottom:2px;white-space:nowrap}

  .stat.wide{position:relative;margin-top:8px;padding:12px 14px;border:1px solid rgba(255,255,255,.08);
    background:linear-gradient(180deg, rgba(255,255,255,.055) 0%, rgba(255,255,255,.022) 100%)}
  .stat.wide .wtop{display:flex;align-items:center;justify-content:space-between}
  .stat.wide .wleft{display:flex;align-items:center;gap:8px}
  .stat.wide .wpill{display:inline-flex;align-items:center;height:18px;padding:0 8px;border-radius:999px;
    font-size:9px;font-weight:800;letter-spacing:.05em}
  .stat.wide .wnum{font-size:34px}

  /* bars */
  .bar{border-radius:999px;overflow:hidden;width:100%;background:rgba(255,255,255,.08)}
  .bar7{height:7px} .bar6{height:6px;margin-top:10px} .bar5{height:5px;margin-top:10px}
  .bar>span{display:block;height:100%;border-radius:999px}

  @media (max-width:780px){
    body{display:flex;flex-direction:column;min-height:100dvh;overflow-x:hidden}
    /* Preview first so creators immediately see the card, sized to fully fit. */
    .stage{order:1;overflow:visible;padding:14px 12px 10px;background:#eef0f2;flex:0 0 auto}
    .sidebar{order:2;overflow:visible;border-right:none;border-top:1px solid #e3e5e8;padding:20px 18px 40px}
  }

  /* ===================== CROP MODAL ===================== */
  .crop-modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:rgba(8,8,12,.72);padding:20px;font-family:"Inter",-apple-system,sans-serif}
  .crop-modal[hidden]{display:none}
  .crop-card{width:min(460px,94vw);background:#fff;border-radius:18px;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .crop-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px}
  .crop-head h2{margin:0;font-size:18px;font-weight:700;color:#111}
  .crop-x{border:none;background:none;cursor:pointer;color:#6b7280;font-size:20px;line-height:1;padding:4px;border-radius:6px}
  .crop-x:hover{background:#f1f3f5}
  .crop-body{background:#0b0e13;padding:30px 24px;display:flex;justify-content:center}
  .crop-view{position:relative;width:min(360px,76vw);aspect-ratio:1;border-radius:4px;overflow:hidden;
    background:#000;cursor:grab;outline:1px solid rgba(255,255,255,.55);outline-offset:-1px;touch-action:none}
  .crop-view:active{cursor:grabbing}
  .crop-img{position:absolute;top:0;left:0;user-select:none;-webkit-user-drag:none;pointer-events:none;max-width:none}
  .crop-grid{position:absolute;inset:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.4),rgba(255,255,255,.4)),
      linear-gradient(rgba(255,255,255,.4),rgba(255,255,255,.4)),
      linear-gradient(rgba(255,255,255,.4),rgba(255,255,255,.4)),
      linear-gradient(rgba(255,255,255,.4),rgba(255,255,255,.4));
    background-size:1px 100%,1px 100%,100% 1px,100% 1px;
    background-position:33.33% 0,66.66% 0,0 33.33%,0 66.66%;
    background-repeat:no-repeat}
  .crop-foot{padding:18px 22px 22px;background:#fff}
  .zoom-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .zoom-row svg{width:20px;height:20px;color:#9aa0a6;flex-shrink:0}
  .zoom-row input[type=range]{flex:1;accent-color:var(--blue);height:4px;cursor:pointer}
  .crop-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .crop-cancel{padding:14px;border-radius:12px;border:1px solid #e3e5e8;background:#fff;color:#111;
    font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
  .crop-cancel:hover{background:#f7f8f9}
  .crop-apply{padding:14px;border-radius:12px;border:none;background:var(--blue);color:#fff;
    font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
  .crop-apply:active{transform:translateY(1px)}
  .crop-apply svg{width:16px;height:16px}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="head"><h1>Edit Fields</h1><span class="chev">‹</span></div>

    <div class="grp">
      <p class="sec">Aspect Ratio</p>
      <div class="ratio-row">
        <button class="ratio-btn active" data-ratio="default">Default (9:19.5)</button>
        <button class="ratio-btn" data-ratio="square">Square (1:1)</button>
      </div>
    </div>

    <div class="grp">
      <p class="sec">Profile Picture</p>
      <div class="pp-row">
        <div class="pp-prev" id="ppPrev">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M3 17l5-4 4 3 3-3 6 5"/></svg>
        </div>
        <button class="upload-btn" id="uploadBtn">Upload Image</button>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>
    </div>

    <div class="grp">
      <p class="sec">Overall Score</p>
      <div class="row"><label class="fld">Overall (0-100)</label><input type="number" min="0" max="100" value="94" data-key="overall"></div>
    </div>

    <div class="grp">
      <p class="sec">Stats</p>
      <div class="row"><label class="fld">Potential (0-100)</label><input type="number" min="0" max="100" value="97" data-key="potential"></div>
      <div class="row"><label class="fld">Muscle Mass (0-100)</label><input type="number" min="0" max="100" value="92" data-key="muscle"></div>
      <div class="row"><label class="fld">Symmetry (0-100)</label><input type="number" min="0" max="100" value="90" data-key="symmetry"></div>
      <div class="row"><label class="fld">Body Fat (0-100)</label><input type="number" min="0" max="100" value="95" data-key="bodyfat"></div>
      <div class="row"><label class="fld">Definition (0-100)</label><input type="number" min="0" max="100" value="96" data-key="definition"></div>
    </div>

    <button class="btn-export" id="exportBtn">Export Image</button>
    <button class="btn-reset" id="resetBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
      Reset to Defaults
    </button>
  </aside>

  <main class="stage">
    <div id="frameOuter">
      <div id="frame">
        <div class="card-center">
          <div id="card">
            <div class="bloom"></div>

            <div class="avatar-wrap">
              <div class="avatar"><div class="avatar-inner" id="cAvatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="9" cy="9" r="2"/><path d="M3 16l5-4 4 3 3-3 6 5"/></svg>
              </div></div>
            </div>

            <div class="hero">
              <span class="overall-label">OVERALL</span>
              <div class="score-row">
                <div class="score-num"><span class="score" id="cOverall">94</span><span class="score-slash">/100</span></div>
                <span class="pill" id="cPill">ELITE</span>
              </div>
              <div class="hero-bar"><div class="bar bar7"><span id="barOverall"></span></div></div>
            </div>

            <div class="badge">
              <div class="badge-inner">
                <span class="badge-logo"><img id="brandLogo" alt="PhysiqMax logo"></span>
                <span>PhysiqMax App</span>
              </div>
            </div>

            <div class="grid" id="cGrid"></div>
            <div id="cWide"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ===================== CROP MODAL ===================== -->
  <div id="cropModal" class="crop-modal" hidden>
    <div class="crop-card">
      <div class="crop-head">
        <h2>Crop Image</h2>
        <button id="cropClose" class="crop-x" aria-label="Close">&times;</button>
      </div>
      <div class="crop-body">
        <div id="cropView" class="crop-view">
          <img id="cropImg" class="crop-img" alt="">
          <div class="crop-grid"></div>
        </div>
      </div>
      <div class="crop-foot">
        <div class="zoom-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3M8 11h6"/></svg>
          <input id="cropZoom" type="range" min="1" max="4" step="0.01" value="1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3M11 8v6M8 11h6"/></svg>
        </div>
        <div class="crop-btns">
          <button id="cropCancel" class="crop-cancel">Cancel</button>
          <button id="cropApply" class="crop-apply">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>
            Apply Crop
          </button>
        </div>
      </div>
    </div>
  </div>

  const subStats = [
    {key:'potential', label:'Potential'},
    {key:'muscle',    label:'Muscle Mass'},
    {key:'symmetry',  label:'Symmetry'},
    {key:'bodyfat',   label:'Body Fat'},
  ];
  const defaults = {ratio:'default', overall:94, potential:97, muscle:92, symmetry:90, bodyfat:95, definition:96, avatar:null};
  let state = {...defaults};

  // Frame sizes are tuned so the native-width (330px) card fills them with the
  // same margins the preview showed — no scaling transform needed.
  const RATIOS = { default:{w:350,h:740}, square:{w:740,h:740} };
  const PREVIEW_W = 540, PREVIEW_H = 780;

  // ---- tier system (mirrors the app's scoreTier) ----
  const C = { green:'#63D463', greenAccent:'#20E0A0', gold:'#FFD966', amber:'#FFB020', rose:'#FF7A7A' };
  function tier(s){
    if(s>=90) return {label:'ELITE',  color:C.greenAccent};
    if(s>=80) return {label:'STRONG', color:C.green};
    if(s>=70) return {label:'GOOD',   color:C.gold};
    if(s>=60) return {label:'SOLID',  color:C.amber};
    return {label:'RISING', color:C.rose};
  }
  function rgba(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
  function barFill(v,color){
    return `width:${v}%;background:linear-gradient(90deg,${rgba(color,.7)} 0%,${color} 100%);box-shadow:0 0 10px ${rgba(color,.4)}`;
  }

  // ---- card rendering ----
  function statCard(s){
    const v=state[s.key], t=tier(v);
    return `<div class="stat">
      <span class="lbl">${s.label}</span>
      <div class="srow">
        <div class="val"><span class="num">${v}</span><span class="slash">/100</span></div>
        <span class="stier" style="color:${t.color}">${t.label}</span>
      </div>
      <div class="bar bar5"><span style="${barFill(v,t.color)}"></span></div>
    </div>`;
  }
  function wideCard(){
    const v=state.definition, t=tier(v);
    return `<div class="stat wide">
      <div class="wtop">
        <div class="wleft">
          <span class="lbl">Definition</span>
          <span class="wpill" style="color:${t.color};background:${rgba(t.color,.1)};border:1px solid ${rgba(t.color,.25)}">${t.label}</span>
        </div>
        <div class="val"><span class="num wnum">${v}</span><span class="slash">/100</span></div>
      </div>
      <div class="bar bar6"><span style="${barFill(v,t.color)}"></span></div>
    </div>`;
  }
  function renderHero(){
    const t=tier(state.overall);
    const o=document.getElementById('cOverall');
    o.textContent=state.overall;
    o.style.color=t.color;
    o.style.textShadow=`0 0 38px ${rgba(t.color,.4)}`;
    const p=document.getElementById('cPill');
    p.textContent=t.label;
    p.style.color=t.color;
    p.style.background=rgba(t.color,.1);
    p.style.border=`1px solid ${rgba(t.color,.35)}`;
    p.style.boxShadow=`0 0 16px ${rgba(t.color,.2)}`;
    document.getElementById('barOverall').style.cssText=barFill(state.overall,t.color);
  }
  function renderAvatar(){
    const inner=document.getElementById('cAvatar');
    const prev=document.getElementById('ppPrev');
    if(state.avatar){
      // state.avatar is a square crop from the cropper, so cover fills the box
      // exactly (no further cropping). html2canvas renders this faithfully.
      inner.innerHTML='';
      inner.style.background=`#15171B url("${state.avatar}") center / cover no-repeat`;
      prev.innerHTML='';
      prev.style.background=`#374151 url("${state.avatar}") center / cover no-repeat`;
    }
  }
  function render(){
    document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.toggle('active', b.dataset.ratio===state.ratio));
    renderHero();
    document.getElementById('cGrid').innerHTML = subStats.map(statCard).join('');
    document.getElementById('cWide').innerHTML = wideCard();
    renderAvatar();
    document.getElementById('brandLogo').src = LOGO;
    layout();
  }

  // ---- frame sizing ----
  function layout(){
    const {w,h}=RATIOS[state.ratio];
    const frame=document.getElementById('frame');
    const outer=document.getElementById('frameOuter');

    frame.style.width=w+'px'; frame.style.height=h+'px';

    // The card sits at native size, centered by the frame's flexbox — no card
    // transform. Only the frame is scaled, and only for on-screen display; that
    // scale is removed during export so html2canvas captures it at 1:1.
    let boxW=PREVIEW_W, boxH=PREVIEW_H;
    if(window.innerWidth<=780){            // phone: fit screen so the whole card shows
      boxW=window.innerWidth-24;
      boxH=Math.round(window.innerHeight*0.64);  // innerHeight is stable when keyboard opens
    }
    const S=Math.min(boxW/w, boxH/h);
    frame.style.transform=`scale(${S})`;
    outer.style.width=(w*S)+'px';
    outer.style.height=(h*S)+'px';
  }

  // ---- inputs ----
  document.querySelectorAll('.ratio-btn').forEach(btn=>btn.addEventListener('click',()=>{state.ratio=btn.dataset.ratio;render();}));
  document.querySelectorAll('input[type=number]').forEach(inp=>inp.addEventListener('input',e=>{
    let v=Math.max(0,Math.min(100,parseInt(e.target.value||0)));
    state[e.target.dataset.key]=isNaN(v)?0:v;
    render();
  }));
  document.getElementById('uploadBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=ev=>openCropper(ev.target.result); r.readAsDataURL(f);
    e.target.value=''; // allow re-selecting the same file
  });
  // Click the sidebar thumbnail to re-crop the current photo
  document.getElementById('ppPrev').addEventListener('click',()=>{ if(crop.src) openCropper(crop.src); });
  document.getElementById('resetBtn').addEventListener('click',()=>{
    state={...defaults}; crop.src=null;
    document.querySelectorAll('input[type=number]').forEach(i=>i.value=defaults[i.dataset.key]);
    const prev=document.getElementById('ppPrev'), av=document.getElementById('cAvatar');
    prev.style.background='#374151'; av.style.background='#15171B';
    prev.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M3 17l5-4 4 3 3-3 6 5"/></svg>';
    av.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="9" cy="9" r="2"/><path d="M3 16l5-4 4 3 3-3 6 5"/></svg>';
    render();
  });

  // ===================== CROP / ZOOM MODAL =====================
  // Lets the creator pan + zoom to choose exactly what's framed. Outputs a
  // square image, so it drops into the avatar with no further cropping and the
  // export stays pixel-faithful to the preview.
  const crop = { img:new Image(), src:null, V:0, nw:0, nh:0, cover:1, z:1, ox:0, oy:0 };
  const cropModal = document.getElementById('cropModal');
  const cropView  = document.getElementById('cropView');
  const cropImg   = document.getElementById('cropImg');
  const cropZoom  = document.getElementById('cropZoom');

  function dispScale(){ return crop.cover * crop.z; }
  function clampPan(){
    const dw=crop.nw*dispScale(), dh=crop.nh*dispScale();
    crop.ox=Math.min(0, Math.max(crop.V-dw, crop.ox));
    crop.oy=Math.min(0, Math.max(crop.V-dh, crop.oy));
  }
  function paintCrop(){
    clampPan();
    cropImg.style.width =(crop.nw*dispScale())+'px';
    cropImg.style.height=(crop.nh*dispScale())+'px';
    cropImg.style.left  =crop.ox+'px';
    cropImg.style.top   =crop.oy+'px';
  }
  // Re-zoom while keeping the point under (px,py) fixed on screen
  function zoomTo(nz, px, py){
    nz=Math.min(parseFloat(cropZoom.max), Math.max(parseFloat(cropZoom.min), nz));
    const sOld=dispScale();
    const imgX=(px-crop.ox)/sOld, imgY=(py-crop.oy)/sOld;
    crop.z=nz;
    const sNew=dispScale();
    crop.ox=px-imgX*sNew; crop.oy=py-imgY*sNew;
    cropZoom.value=nz;
    paintCrop();
  }

  function openCropper(src){
    crop.src=src;
    crop.img=new Image();
    crop.img.onload=()=>{
      crop.nw=crop.img.naturalWidth; crop.nh=crop.img.naturalHeight;
      cropImg.src=src;
      cropModal.hidden=false;
      requestAnimationFrame(()=>{
        crop.V=cropView.clientWidth;                 // square viewport
        crop.cover=Math.max(crop.V/crop.nw, crop.V/crop.nh); // min zoom fills the box
        crop.z=1; cropZoom.value=1;
        crop.ox=(crop.V-crop.nw*crop.cover)/2;        // centered
        crop.oy=(crop.V-crop.nh*crop.cover)/2;
        paintCrop();
      });
    };
    crop.img.src=src;
  }
  function closeCropper(){ cropModal.hidden=true; }

  // drag to pan (pointer events cover mouse + touch)
  let dragging=false, lastX=0, lastY=0;
  cropView.addEventListener('pointerdown',e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; cropView.setPointerCapture(e.pointerId); });
  cropView.addEventListener('pointermove',e=>{
    if(!dragging) return;
    crop.ox+=e.clientX-lastX; crop.oy+=e.clientY-lastY;
    lastX=e.clientX; lastY=e.clientY; paintCrop();
  });
  const endDrag=()=>{dragging=false;};
  cropView.addEventListener('pointerup',endDrag);
  cropView.addEventListener('pointercancel',endDrag);
  // wheel to zoom (anchored at cursor)
  cropView.addEventListener('wheel',e=>{
    e.preventDefault();
    const r=cropView.getBoundingClientRect();
    zoomTo(crop.z + (-e.deltaY*0.0016), e.clientX-r.left, e.clientY-r.top);
  },{passive:false});
  // slider zoom (anchored at center)
  cropZoom.addEventListener('input',()=>zoomTo(parseFloat(cropZoom.value), crop.V/2, crop.V/2));

  document.getElementById('cropCancel').addEventListener('click',closeCropper);
  document.getElementById('cropClose').addEventListener('click',closeCropper);
  cropModal.addEventListener('click',e=>{ if(e.target===cropModal) closeCropper(); });

  document.getElementById('cropApply').addEventListener('click',()=>{
    const s=dispScale();
    const sx=(0-crop.ox)/s, sy=(0-crop.oy)/s, span=crop.V/s; // source square in natural px
    // Output at the cropped region's true pixel size (capped), so we keep the
    // uploaded photo's real resolution and never upscale/soften it.
    const MAX_OUT=1600;
    const OUT=Math.max(1, Math.round(Math.min(span, MAX_OUT)));
    const c=document.createElement('canvas'); c.width=OUT; c.height=OUT;
    const x=c.getContext('2d');
    x.imageSmoothingEnabled=true; x.imageSmoothingQuality='high';
    x.drawImage(crop.img, sx, sy, span, span, 0, 0, OUT, OUT);
    state.avatar=c.toDataURL('image/png'); // PNG = lossless, no recompression artifacts
    closeCropper();
    renderAvatar();
  });


  // ---- export ----
  document.getElementById('exportBtn').addEventListener('click',async()=>{
    const btn=document.getElementById('exportBtn'); const frame=document.getElementById('frame');
    const prevTxt=btn.textContent; btn.textContent='Rendering…'; btn.disabled=true;
    const saved=frame.style.transform;
    try{
      if(document.fonts&&document.fonts.ready){await document.fonts.ready;}
      frame.style.transform='none';                 // capture at full resolution
      await new Promise(r=>requestAnimationFrame(r));
      const canvas=await html2canvas(frame,{scale:3,backgroundColor:null,useCORS:true,logging:false});
      const a=document.createElement('a');
      a.download=`physiqmax-${state.ratio}-${state.overall}.png`;
      a.href=canvas.toDataURL('image/png'); a.click();
    }catch(err){alert('Export failed: '+err.message);}
    finally{frame.style.transform=saved;btn.textContent=prevTxt;btn.disabled=false;}
  });

  render();
  window.addEventListener('resize',layout);
  window.addEventListener('orientationchange',()=>setTimeout(layout,150));
</script>
</body>
</html>
